services:
  lex-proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile
    ports:
      - "8004:8004"
    env_file:
      - ./.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s