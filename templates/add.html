{% extends "base.html" %}
{% block title %}Добавить слово — Lex{% endblock %}

{% block content %}
<hgroup style="text-align: center; margin-bottom: 2rem; margin-top: 1rem;">
    <h1>Новое слово</h1>
    <p>Переведи и сохрани в словарь</p>
</hgroup>

<!-- Уведомления об успехе/ошибке -->
{% if added %}
<article style="background: var(--pico-ins-color); color: var(--pico-primary-inverse); padding: 1rem; margin-bottom: 1rem;">
    ✅ Слово успешно добавлено в словарь!
</article>
{% endif %}

{% if error %}
<article style="background: var(--pico-del-color); color: var(--pico-primary-inverse); padding: 1rem; margin-bottom: 1rem;">
    ❌ {{ error }}
</article>
{% endif %}

<article>
    <form method="post" action="/add" style="margin-bottom: 0;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        
        <!-- Поле ввода -->
        <label for="word">Иностранное слово</label>
        <input type="text" id="word" name="word" required placeholder="Например: application" autofocus>
        <button type="button" id="translate-btn" class="secondary" style="width: 100%; margin-top: 0.5rem;">🔄 Перевести</button>

        <!-- Поле перевода -->
        <label for="translation">Перевод</label>
        <input type="text" id="translation" name="translation" required placeholder="Например: приложение">

        <!-- Кнопка сохранения в футере карточки -->
        <footer style="margin-top: 2rem; padding-bottom: 0;">
            <button type="submit" style="width: 100%;">Сохранить в словарь</button>
        </footer>
    </form>
</article>

<script>
document.getElementById("translate-btn").addEventListener("click", async () => {
    const wordInput = document.getElementById("word");
    const translationInput = document.getElementById("translation");
    const btn = document.getElementById("translate-btn");
    const csrfInput = document.querySelector('input[name="csrf_token"]');

    if (!wordInput.value.trim()) {
        return;
    }

    btn.disabled = true;
    btn.textContent = "⏳ ...";

    try {
        const resp = await fetch("/add/translate", {
            method: "POST",
            headers: { 
                "Content-Type": "application/x-www-form-urlencoded",
                "X-CSRF-Token": csrfInput.value,
            },
            body: "word=" + encodeURIComponent(wordInput.value),
        });
        const data = await resp.json();
        if (data.error) {
            alert("Ошибка: " + data.error);
        } else {
            translationInput.value = data.translation || "";
            if (!data.translation) {
                alert("Перевод не найден. Проверьте API ключ.");
            }
        }
    } catch (e) {
        alert("Ошибка сети: " + e.message);
    }

    btn.disabled = false;
    btn.textContent = "🔄 Перевести";
});
</script>
{% endblock %}
