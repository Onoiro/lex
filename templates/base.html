<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Lex{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body>
    <div class="container">
        <nav>
            <ul>
                <li><a href="/">Lex</a></li>
                <li><a href="/add">Добавить</a></li>
                <li><a href="/review">Повтор</a></li>
            </ul>
        </nav>

        <main style="padding-bottom:3rem">
            {% block content %}{% endblock %}
        </main>

        <footer style="position:fixed;left:0;bottom:0;right:0;margin:0;padding:0.5rem;background:var(--pico-background-color);color:var(--muted-color);text-align:center;border-top:1px solid var(--pico-muted-border-color)">
            Lex v{{ version }}
        </footer>
    </div>
</body>
</html>
