{% extends "base.html" %}

{% block title %}{{ _t('settings.title') }}{% endblock %}

{% block content %}
<h2>{{ _t('settings.heading') }}</h2>
<p>{{ _t('settings.description') }}</p>

<form method="post" action="/settings">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    
    <fieldset>
        <legend>{{ _t('settings.app_language') }}</legend>
        <label for="locale">
            {{ _t('settings.choose_app_language') }}
        </label>
        <div>
            <select id="locale" name="locale" required>
                {% for code in supported_locales %}
                <option value="{{ code }}" {% if code == current_locale %}selected{% endif %}>
                    {{ _get_language_name(code) }}
                </option>
                {% endfor %}
            </select>
        </div>
    </fieldset>

    <fieldset>
        <legend>{{ _t('settings.translate') }}</legend>
        <label for="source_lang">
            {{ _t('settings.source_lang') }}
        </label>
        <div>
            <select id="source_lang" name="source_lang" required>
                {% for code in supported_sources %}
                <option value="{{ code }}" {% if code == source_lang %}selected{% endif %}>
                    {% if code == 'auto' %}{{ _t('settings.auto_detect') }}{% else %}{{ _get_language_name(code) }}{% endif %}
                </option>
                {% endfor %}
            </select>
        </div>

        <label for="target_lang">
            {{ _t('settings.target_lang') }}
        </label>
        <div>
            <select id="target_lang" name="target_lang" required>
                {% for code in supported_targets %}
                <option value="{{ code }}" {% if code == target_lang %}selected{% endif %}>
                    {{ _get_language_name(code) }}
                </option>
                {% endfor %}
            </select>
        </div>
    </fieldset>

    <button type="submit">{{ _t('settings.save') }}</button>
</form>

<script>
// Warn user when source and target languages are the same
(function() {
    var src = document.getElementById("source_lang");
    var tgt = document.getElementById("target_lang");
    var warning = document.createElement("small");
    warning.style.color = "var(--pico-del-color)";
    warning.style.display = "none";
    warning.id = "same-lang-warning";
    tgt.parentElement.appendChild(warning);

    function check() {
        if (src.value !== "auto" && src.value === tgt.value) {
            warning.textContent = "{{ _t('settings.same_lang_warning') }}";
            warning.style.display = "block";
        } else {
            warning.style.display = "none";
        }
    }
    src.addEventListener("change", check);
    tgt.addEventListener("change", check);
    check();
})();
</script>

{% endblock %}
