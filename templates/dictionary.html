{% extends "base.html" %}
{% block title %}Мой Словарь — Lex{% endblock %}

{% block content %}
<hgroup style="text-align: center; margin-bottom: 2rem; margin-top: 1rem;">
    <h1>Мой словарь</h1>
    <p>Всего сохранено слов: {{ total }}</p>
</hgroup>

{% if not words %}
<article style="text-align: center; padding: 3rem 1rem;">
    <h2 style="margin-bottom: 1rem;">Словарь пока пуст 🍃</h2>
    <p style="color: var(--pico-muted-color);">Добавь свое первое слово, чтобы начать тренировки.</p>
    <a href="/add" role="button">Перевести слово</a>
</article>
{% else %}
<article style="padding: 0;"> <!-- Убираем padding у карточки, чтобы таблица была на всю ширину -->
    
    <!-- Тег figure делает таблицу скроллируемой по горизонтали на узких экранах -->
    <figure style="margin: 0;">
        <table role="grid" style="margin: 0;">
            <thead>
                <tr>
                    <th style="width: 30%; padding-left: 1.5rem;">Слово</th>
                    <th style="width: 30%;">Перевод</th>
                    <th style="width: 10%; text-align: center;">Знаю/Забыл</th>
                    <th style="width: 10%; text-align: center;">Время</th>
                    <th style="width: 10%; text-align: center;">Интервал</th>
                    <th style="width: 10%; text-align: center;">%</th>
                    <th style="width: 10%; text-align: center; padding-right: 1.5rem;">Удалить</th>
                </tr>
            </thead>
            <tbody>
                {% for w in words %}
                <tr>
                    <td style="padding-left: 1.5rem;"><strong>{{ w.word }}</strong></td>
                    <td>{{ w.translation }}</td>
                    <td style="text-align: center; font-size: 0.85rem; color: var(--pico-muted-color);">
                        {% if w.know_count > 0 or w.forgot_count > 0 %}
                            <span style="color: green;">{{ w.know_count }}</span> / <span style="color: red;">{{ w.forgot_count }}</span>
                        {% else %}
                            —
                        {% endif %}
                    </td>
                    <td style="text-align: center; font-size: 0.85rem; color: var(--pico-muted-color);">
                        {% if w.best_time is not none and w.avg_time is not none %}
                            <span>⚡ {{ "%.2f"|format(w.best_time) }}</span> / <span>{{ "%.2f"|format(w.avg_time) }}</span>
                        {% else %}
                            —
                        {% endif %}
                    </td>
                    <td style="text-align: center; font-size: 0.85rem; color: var(--pico-muted-color);">
                        {% if w.interval > 0 %}
                            {{ w.interval }}д
                        {% else %}
                            —
                        {% endif %}
                    </td>
                    <td style="text-align: center; font-size: 0.85rem; color: var(--pico-muted-color);">
                        {% set total = w.know_count + w.forgot_count %}
                        {% if total > 0 %}
                            {{ "%.0f"|format((w.know_count / total) * 100) }}%
                        {% else %}
                            —
                        {% endif %}
                    </td>
                    <td style="text-align: center; padding-right: 1.5rem;">
                        <form method="post" action="/dictionary/delete/{{ w.id }}" style="margin: 0;" onsubmit="return confirm('Точно удалить слово «{{ w.word }}»?')">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                            <!-- Используем outline и class="contrast", чтобы кнопка была аккуратной -->
                            <button type="submit" class="outline contrast" style="border: none; padding: 0.25rem 0.5rem; font-size: 1.2rem;" title="Удалить">
                                🗑️
                            </button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </figure>
</article>
{% endif %}
{% endblock %}
