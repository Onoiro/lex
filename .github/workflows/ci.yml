name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  client-check:
    name: Client (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type check
        run: node_modules/.bin/tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload client coverage
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcdf65db41cfff584d913 # v4
        with:
          name: client-coverage
          path: client/coverage/

      - name: Build
        run: npm run build

  server-lint:
    name: Server Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e44894dc6f6f84 # v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen --all-groups --no-build

      - name: Run ruff
        run: uv run --frozen --no-build ruff check .

  server-test:
    name: Server Test
    runs-on: ubuntu-latest
    needs: server-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e44894dc6f6f84 # v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen --all-groups --no-build

      - name: Run tests with coverage
        run: |
          mkdir -p coverage-reports
          uv run --frozen --no-build pytest --cov=. --cov-report=term-missing --cov-report=xml:coverage-reports/coverage.xml --junitxml=coverage-reports/test-results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcdf65db41cfff584d913 # v4
        with:
          name: coverage-report
          path: coverage-reports/

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: [server-test, client-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Download server coverage report
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: coverage-report
          path: coverage-reports

      - name: Download client coverage report
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: client-coverage
          path: client/coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@aa494459d7c39c0124cba94641a6c625cb685c5b # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
