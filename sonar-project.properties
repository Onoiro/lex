sonar.projectKey=Onoiro_lex
sonar.organization=abo

sonar.sources=.
sonar.exclusions=**/tests/**,**/__pycache__/**,**/.venv/**,**/migrations/**,coverage-reports/**,htmlcov/**,.ruff_cache/**,.pytest_cache/**,**/node_modules/**,**/dist/**,**/android/**,**/src-tauri/target/**,**/*.png,**/*.jpg,**/*.jpeg,**/*.gif,**/*.ico,**/*.webp,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.tests=.
sonar.test.inclusions=**/tests/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.python.coverage.reportPaths=coverage-reports/coverage.xml
sonar.python.xunit.reportPath=coverage-reports/test-results.xml
sonar.python.version=3.13

sonar.typescript.tsconfigPath=client/tsconfig.json
sonar.javascript.lcov.reportPaths=client/coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Suppress intentional SonarQube issues:
#
# githubactions:S7637 — CI actions pinned to version tags (v4/v5) rather than SHAs.
#   Acceptable for this project: official GitHub/SonarSource actions only.
#   SHA pinning adds maintenance burden without meaningful risk reduction here.
#
# typescript:S2245 — Math.random() used for weighted word selection in SM-2 algorithm.
#   Not a security context — SRS review scheduling has no cryptographic requirements.
#   CSPRNG (crypto.getRandomValues) would be overkill and slower.
#
# Web:S5725 — CDN resource for Pico CSS without integrity hash in old server templates.
#   Old server is being decommissioned. Not worth changing.
sonar.issue.ignore.multicriteria=e1,e2,e3

# CI: GitHub Actions pinned to version tags
e1.ruleKey=githubactions:S7637
e1.resourceKey=.github/workflows/ci.yml

# SRS: Math.random() for non-cryptographic word selection
e2.ruleKey=typescript:S2245
e2.resourceKey=client/src/domain/srs.ts

# Old server: CDN withouth integrity (being decommissioned)
e3.ruleKey=Web:S5725
e3.resourceKey=templates/base.html